version: 2

sources:
  - name: raw_rrhh
    schema: raw
    description: "Datos brutos simulados del dominio de RRHH."
    tables:
      - name: empleados
        description: "Maestro bruto de empleados."
        columns:
          - name: empleado_id
            tests:
              - not_null
              - unique
          - name: departamento_id
            tests:
              - not_null
      - name: absentismo
        description: "Registros brutos de absentismo."
        columns:
          - name: ausencia_id
            tests:
              - not_null
              - unique
          - name: empleado_id
            tests:
              - not_null
