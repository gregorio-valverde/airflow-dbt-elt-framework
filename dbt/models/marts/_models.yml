version: 2

models:
  - name: dim_rrhh_empleado
    description: "Dimension analitica de empleados."
    columns:
      - name: empleado_id
        tests:
          - not_null
          - unique

  - name: fct_rrhh_absentismo
    description: "Tabla de hechos de absentismo con contexto organizativo."
    columns:
      - name: ausencia_id
        tests:
          - not_null
          - unique
      - name: empleado_id
        tests:
          - not_null

  - name: mart_rrhh_absentismo_departamento
    description: "Agregado mensual de absentismo por departamento."
